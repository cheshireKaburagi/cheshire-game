<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>禁書内包</title>
<style>
body {
  background: #0a0f1c;
  color: #e0e6ff;
  font-family: "Yu Mincho", serif;
  padding: 40px;
  line-height: 1.8;
}

.box {
  max-width: 700px;
  margin: auto;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(20,25,40,0.6);
  backdrop-filter: blur(10px);
}

h1 {
  color: #8aa2ff;
}

.small {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="box">
<h1>禁書内包</h1>

<p>
記録は、すでに開かれている。<br><br>

あなたがここに辿り着いた時点で、<br>
観測は成立している。<br><br>

戻ることは可能だ。<br>
だが、それは“知らなかった状態に戻る”だけだ。<br><br>

本当に、それでいいのか？<br>
</p>

<p class="small">
Record Accepted.
</p>

</div>

</body>
</html>
